name: Python Workflow Demo

on:
  push:
    branches:
      - 'main'
      - 'feature-*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: docker login -u "nirangu" -p "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Build and Push
        run: |
          # יצירת שם תגית לפי שם ה-branch (למשל feature-1)
          TAG=${{ github.ref_name }}
          IMAGE_NAME=YOUR_DOCKERHUB_USER/flask-app
          
          docker build -t $IMAGE_NAME:$TAG .
          docker push $IMAGE_NAME:$TAG

      - name: Integration Test (Only on Main)
        if: github.ref == 'refs/heads/main'
        run: |
          # הרצת הקונטיינר לבדיקה
          docker run -d -p 5000:5000 --name test-app YOUR_DOCKERHUB_USER/flask-app:main
          sleep 5
          # בדיקה שהשרת עונה
          curl --fail http://localhost:5000 || exit 1
          # ניקוי
          docker stop test-app
          docker rm test-app